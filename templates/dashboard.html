<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Aether Analytics | Sovereign</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --accent-purple: #7C4DFF;
  --accent-purple-soft: #F3E5F5;
  --bg-pure: #F0F2F5;
  --panel-white: #FFFFFF;
  --text-main: #0F172A;
  --border-thick: 4px solid #0F172A;
  --shadow-brutalist: 8px 8px 0px #0F172A;
  --ai-bubble: #F8FAFC;
  --user-bubble: #7C4DFF;
  --chat-glass: rgba(255, 255, 255, 0.94);
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--bg-pure);
  display: flex;
  height: 100dvh; /* Dynamic viewport height for mobile bars */
  width: 100vw;
  overflow: hidden;
  position: fixed;
}

/* --- DASHBOARD UI --- */
.sidebar { 
  width: 320px; background: var(--panel-white); border-right: var(--border-thick); 
  padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0; 
  transition: transform 0.3s ease; z-index: 1001;
}

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; position: relative; }

.header { 
  display: flex; justify-content: space-between; align-items: center; 
  padding: 20px 30px; background: white; border-bottom: var(--border-thick); flex-shrink: 0; 
}

/* THE CRITICAL FIX FOR MOBILE IFRAME SCROLLING */
.content-area { 
  flex: 1; 
  position: relative;
  overflow-y: auto; 
  -webkit-overflow-scrolling: touch; /* Forces momentum scrolling on iOS */
}

#frame { 
  width: 100%; 
  height: 100%; 
  border: none; 
  display: block;
  /* Prevent iframe from expanding beyond parent on mobile */
  min-height: 100%;
}

/* --- CHATBOT UI (Reverted to Original Logic/Style) --- */
#chat-window {
  width: 420px; height: 600px;
  background: var(--chat-glass);
  backdrop-filter: blur(12px); border: 1px solid rgba(0,0,0,0.1);
  display: none; flex-direction: column;
  position: fixed; bottom: 100px; right: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.15); z-index: 2000;
  border-radius: 24px; overflow: hidden;
}

.chat-header { 
    background: #fff; color: var(--text-main); padding: 18px 24px; 
    display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee;
}

#chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

.msg-bubble { padding: 12px 16px; font-size: 14px; line-height: 1.5; max-width: 80%; border-radius: 18px; }
.user-msg { background: var(--user-bubble); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
.ai-msg { background: var(--ai-bubble); color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }

.chat-footer { padding: 15px; background: #fff; border-top: 1px solid #eee; }
.input-container { background: #f1f5f9; border-radius: 12px; display: flex; align-items: center; padding: 5px; }
#chat-input { flex: 1; padding: 10px; border: none; background: transparent; outline: none; }

.stop-btn { background: #e2e8f0; color: #64748b; display: none; padding: 8px 12px; border-radius: 8px; border:none; cursor:pointer; margin-right:5px;}
.send-btn { background: var(--accent-purple); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }

#chat-trigger {
  position: fixed; bottom: 30px; right: 30px;
  width: 60px; height: 60px; background: var(--accent-purple);
  border-radius: 50%; color: white; display: flex;
  justify-content: center; align-items: center; cursor: pointer;
  z-index: 2000; box-shadow: 0 10px 20px rgba(124, 77, 255, 0.3);
}

@media (max-width: 850px) {
  .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  #chat-window { width: 90vw; height: 70dvh; right: 5vw; bottom: 90px; }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div style="margin-bottom: 40px; padding: 15px; border: 3px solid #000;">
    <h1 style="font-family: 'Syncopate'; font-size: 0.8rem;">ANALYTICS</h1>
  </div>
  <nav>
    <a class="nav-link active" href="#" onclick="loadPage('overview', event)">Overview</a>
    <a class="nav-link" href="#" onclick="loadPage('campaigns', event)">Campaigns</a>
  </nav>
</div>

<div class="main">
  <div class="header">
    <button onclick="document.getElementById('sidebar').classList.toggle('open')" style="padding:5px 10px;">MENU</button>
    <h2 id="pageTitle">OVERVIEW</h2>
    <div id="username" style="font-weight:bold; color:var(--accent-purple);">...</div>
  </div>
  <div class="content-area">
    <iframe id="frame" src="/overview"></iframe>
  </div>
</div>

<div id="chat-window">
  <div class="chat-header">
    <strong>AI ASSISTANT</strong>
    <button onclick="toggleChat()" style="background:none; border:none; font-size:1.2rem;">×</button>
  </div>
  <div id="chat-messages"></div>
  <div class="chat-footer">
    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Type..." onkeypress="if(event.key==='Enter') sendMessage()">
      <button class="stop-btn" id="stop-btn" onclick="stopResponse()">Stop</button>
      <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>
<div id="chat-trigger" onclick="toggleChat()">Chat</div>

<script>
let typingTimer = null;
let isGenerating = false;

function toggleChat() {
  const chat = document.getElementById("chat-window");
  chat.style.display = (chat.style.display === "flex") ? "none" : "flex";
}

function stopResponse() {
    clearInterval(typingTimer);
    isGenerating = false;
    document.getElementById('stop-btn').style.display = "none";
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg || isGenerating) return;

  input.value = "";
  isGenerating = true;
  document.getElementById('stop-btn').style.display = "inline-block";

  const msgArea = document.getElementById("chat-messages");
  msgArea.innerHTML += `<div class="msg-bubble user-msg">${msg}</div>`;
  
  const aiBubble = document.createElement("div");
  aiBubble.className = "msg-bubble ai-msg";
  msgArea.appendChild(aiBubble);
  msgArea.scrollTop = msgArea.scrollHeight;

  try {
    const res = await fetch("/api/gemini-chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg })
    });
    const data = await res.json();
    
    let i = 0;
    typingTimer = setInterval(() => {
      if (i < data.reply.length) {
        aiBubble.innerText += data.reply.charAt(i);
        i++;
        msgArea.scrollTop = msgArea.scrollHeight;
      } else {
        stopResponse();
      }
    }, 30);
  } catch (err) {
    aiBubble.innerText = "Error connecting.";
    stopResponse();
  }
}

function loadPage(page, e) {
  document.getElementById("frame").src = `/${page}`;
  document.getElementById("pageTitle").innerText = page.toUpperCase();
  if(window.innerWidth < 850) document.getElementById('sidebar').classList.remove('open');
}

window.onload = () => {
  fetch('/check-session').then(r => r.json()).then(d => {
    if(d.session) document.getElementById("username").innerText = d.session.user_name;
  });
};
</script>
</body>
</html>
