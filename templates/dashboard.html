<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>Aether Analytics | Sovereign</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Syncopate:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --accent-purple: #7C4DFF;
  --accent-purple-soft: #F3E5F5;
  --bg-pure: #F0F2F5;
  --panel-white: #FFFFFF;
  --text-main: #0F172A;
  --border-thick: 4px solid #0F172A;
  --danger: #FF5252;
  --shadow-brutalist: 8px 8px 0px #0F172A;
  --ai-bubble: #F8FAFC;
  --user-bubble: #7C4DFF;
  --chat-glass: rgba(255, 255, 255, 0.98);
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden; /* Critical for fixed layout */
  background: var(--bg-pure);
}

body {
  font-family: 'Space Grotesk', sans-serif;
  display: flex;
}

/* --- DASHBOARD UI --- */
.sidebar { 
  width: 280px; 
  background: var(--panel-white); 
  border-right: var(--border-thick); 
  padding: 30px 20px; 
  display: flex; 
  flex-direction: column; 
  flex-shrink: 0; 
  transition: transform 0.3s ease; 
  z-index: 1001; 
  overflow-y: auto;
}

.brand-container { margin-bottom: 40px; padding: 15px; border: 3px solid var(--text-main); background: var(--accent-purple-soft); box-shadow: 4px 4px 0px var(--text-main); flex-shrink: 0; }
.brand-title { font-family: 'Syncopate', sans-serif; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }

.nav-link { display: block; padding: 16px; margin-bottom: 12px; text-transform: uppercase; font-weight: 700; font-size: 0.8rem; text-decoration: none; color: var(--text-main); border: 2px solid transparent; cursor: pointer; }
.nav-link.active { background: var(--accent-purple); color: #fff; border: 2px solid var(--text-main); box-shadow: 4px 4px 0px var(--text-main); }

.main { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  height: 100vh; 
  position: relative; 
  overflow: hidden; /* Prevents double scrollbars */
}

.header { 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  padding: 15px 30px; 
  background: white; 
  border-bottom: var(--border-thick); 
  flex-shrink: 0; 
  z-index: 10;
}

/* --- FIX: CONTENT AREA SCROLLING --- */
.content-area { 
  flex: 1; 
  position: relative;
  overflow: hidden; /* The iframe handles its own scrolling */
  background: #fff;
}

#frame { 
  width: 100%; 
  height: 100%; 
  border: none; 
  display: block; 
}

#mobile-toggle { display: none; background: var(--text-main); color: white; border: none; padding: 8px 12px; font-family: 'Syncopate'; font-size: 0.6rem; }

/* --- TINY CHATBOT DESIGN --- */
#chat-window {
  width: 320px; /* Reduced width */
  height: 480px; /* Reduced height */
  background: var(--chat-glass);
  backdrop-filter: blur(12px); 
  border: var(--border-thick);
  display: none; 
  flex-direction: column;
  position: fixed; 
  bottom: 100px; 
  right: 30px;
  box-shadow: var(--shadow-brutalist); 
  z-index: 2000;
  overflow: hidden;
}

.chat-header { 
    background: #fff; 
    color: var(--text-main); 
    padding: 12px 18px; 
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    border-bottom: 2px solid var(--text-main);
}

.ai-status { display: flex; align-items: center; gap: 8px; }
.ai-logo-dot {
    width: 24px; height: 24px; background: var(--accent-purple);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: white; border: 1.5px solid #000;
}

.chat-project-card {
  margin: 10px; padding: 10px; background: #fff; border: 2px solid var(--text-main);
  font-size: 10px; line-height: 1.4;
  color: var(--text-main);
}

#chat-messages { 
    flex: 1; 
    overflow-y: auto; 
    padding: 15px; 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    background: #fff;
}

.msg-bubble { 
    padding: 10px 14px; 
    font-size: 13px; 
    line-height: 1.4; 
    max-width: 90%; 
    border: 2px solid var(--text-main); 
}
.user-msg { background: var(--accent-purple-soft); align-self: flex-end; box-shadow: 3px 3px 0px #000; }
.ai-msg { background: #fff; align-self: flex-start; box-shadow: 3px 3px 0px var(--accent-purple); }

.chat-footer { padding: 10px; background: #fff; border-top: 2px solid var(--text-main); }
.input-container { display: flex; gap: 5px; }
#chat-input { 
    flex: 1; 
    padding: 8px; 
    border: 2px solid var(--text-main); 
    outline: none; 
    font-family: inherit; 
    font-size: 12px; 
}

.btn-circle {
    width: 35px; height: 35px; border: 2px solid var(--text-main);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: 0.1s; font-size: 14px;
}
.send-btn { background: var(--accent-purple); color: white; }
.send-btn:active { transform: translate(2px, 2px); }

#chat-trigger {
  position: fixed; bottom: 30px; right: 30px;
  width: 55px; height: 55px; background: var(--accent-purple);
  border: var(--border-thick); color: white; display: flex;
  justify-content: center; align-items: center; cursor: pointer;
  z-index: 2000; box-shadow: 5px 5px 0px #000;
}

@media (max-width: 850px) {
  .sidebar { position: absolute; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
  .sidebar.open { transform: translateX(0); }
  #chat-window { width: 85vw; height: 60vh; right: 7.5vw; bottom: 95px; }
  #mobile-toggle { display: block; }
}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="brand-container">
    <h1 class="brand-title">ANALYTICS<br>DASHBOARD</h1>
  </div>
  <nav>
    <a class="nav-link active" onclick="loadPage('overview', event)">Overview</a>
    <a class="nav-link" onclick="loadPage('campaigns', event)">Campaigns</a>
    <a class="nav-link" onclick="loadPage('products', event)">Products</a>
    <a class="nav-link" onclick="loadPage('orders', event)">Orders</a>
  </nav>
  <button class="nav-link" onclick="logout()" style="margin-top:auto; color:var(--danger)">Logout</button>
</div>

<div class="main">
  <div class="header">
    <button id="mobile-toggle" onclick="toggleMenu()">MENU</button>
    <h2 id="pageTitle" style="font-size: 1rem; font-weight: 800;">OVERVIEW</h2>
    <div style="font-family: 'Fira Code'; font-size:0.65rem;">SESSION_ID: <span id="username" style="color:var(--accent-purple); font-weight:800;">...</span></div>
  </div>
  <div class="content-area">
    <iframe id="frame" src="/overview"></iframe>
  </div>
</div>

<!-- TINY CHATBOT -->
<div id="chat-window">
  <div class="chat-header">
    <div class="ai-status">
        <div class="ai-logo-dot">A</div>
        <div>
            <div style="font-size: 11px; font-weight: 800; letter-spacing: 1px;">AETHER_CORE</div>
            <div style="font-size: 9px; color: #22c55e; font-weight: bold;">[ONLINE]</div>
        </div>
    </div>
    <button onclick="toggleChat()" style="background:none; border:none; color:#000; cursor:pointer; font-weight: 900;">✕</button>
  </div>
  
  <div class="chat-project-card">
    CORE: SOVEREIGN_V4.2<br>STATUS: MONITORING_READY
  </div>
  <div id="chat-messages"></div>
  <div class="chat-footer">
    <div class="input-container">
      <input type="text" id="chat-input" placeholder="Enter query..." onkeypress="handleEnter(event)">
      <div class="controls-group">
        <button class="btn-circle stop-btn" id="stop-btn" onclick="stopResponse()" style="display:none; background:#eee;">■</button>
        <button class="btn-circle send-btn" id="send-btn" onclick="sendMessage()">✦</button>
      </div>
    </div>
  </div>
</div>

<div id="chat-trigger" onclick="toggleChat()">✦</div>

<script>
let currentResponse = "";
let typeIdx = 0;
let typingTimer = null;
let isGenerating = false;

function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

function toggleChat() {
  const win = document.getElementById("chat-window");
  win.style.display = (win.style.display === "flex") ? "none" : "flex";
  if(win.style.display === "flex") {
      document.getElementById("chat-input").focus();
  }
}

function stopResponse() {
    clearInterval(typingTimer);
    isGenerating = false;
    document.getElementById('stop-btn').style.display = "none";
    document.getElementById('chat-input').disabled = false;
    const activeBubble = document.querySelector('.typing-state');
    if(activeBubble) activeBubble.classList.remove('typing-state');
}

function formatContent(text) {
    return text.replace(/^\s*[\*\-]\s*(.*)/gm, '<li>$1</li>')
               .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
               .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
}

function streamText() {
    const aiBubble = document.querySelector('.typing-state');
    if (!aiBubble) return;
    typingTimer = setInterval(() => {
        if (typeIdx < currentResponse.length) {
            aiBubble.innerHTML = formatContent(currentResponse.substring(0, typeIdx + 1));
            typeIdx++;
            const msgArea = document.getElementById("chat-messages");
            msgArea.scrollTop = msgArea.scrollHeight;
        } else {
            stopResponse();
        }
    }, 15);
}

async function sendMessage() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg || isGenerating) return;

  input.value = "";
  isGenerating = true;
  document.getElementById('stop-btn').style.display = "flex";
  
  const msgArea = document.getElementById("chat-messages");
  msgArea.innerHTML += `<div class="msg-bubble user-msg">${msg}</div>`;
  
  const aiBubble = document.createElement("div");
  aiBubble.className = "msg-bubble ai-msg typing-state";
  msgArea.appendChild(aiBubble);
  msgArea.scrollTop = msgArea.scrollHeight;

  try {
    const res = await fetch("/api/gemini-chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: msg + " (Keep reply very short, max 2 sentences or 3 bullets.)" })
    });
    const data = await res.json();
    currentResponse = data.reply;
    typeIdx = 0;
    streamText();
  } catch (err) {
    aiBubble.innerHTML = "ERR: UPLINK_LOST";
    stopResponse();
  }
}

function loadPage(page, e) {
  document.getElementById("frame").src = `/${page}`;
  document.getElementById("pageTitle").innerText = page.toUpperCase();
  document.querySelectorAll(".nav-link").forEach(el => el.classList.remove("active"));
  
  // Logical highlight
  if(e && e.target) {
    e.target.classList.add("active");
  } else {
      // Fallback for direct calls
      const links = document.querySelectorAll(".nav-link");
      links.forEach(l => { if(l.innerText.toLowerCase() === page) l.classList.add("active"); });
  }

  if(window.innerWidth <= 850) toggleMenu();
}

function handleEnter(e) { if(e.key === 'Enter') sendMessage(); }
function logout() { window.location.href = "/logout"; }

window.onload = function() {
  fetch('/check-session').then(res => res.json()).then(data => {
    if(data.session && data.session.user_name) 
      document.getElementById("username").innerText = data.session.user_name.toUpperCase();
  });
};
</script>
</body>
</html>
