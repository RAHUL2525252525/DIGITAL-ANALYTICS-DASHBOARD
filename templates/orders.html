<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether | Order Intelligence</title>

<!-- Modern Sans-Serif Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4F46E5; /* Indigo */
    --primary-light: #EEF2FF;
    --success: #10B981;
    --danger: #EF4444;
    --warning: #F59E0B;
    --bg-main: #F8FAFC;
    --surface: #FFFFFF;
    --text-main: #1E293B;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --radius: 16px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 40px;
    line-height: 1.5;
}

/* --- HEADER --- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

h1::before {
    content: '';
    width: 8px;
    height: 24px;
    background: var(--primary);
    border-radius: 4px;
}

/* --- KPI GRID --- */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 40px;
}

.kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: transform 0.2s ease;
}

.kpi-card:hover { transform: translateY(-4px); }

.kpi-card .label {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

.kpi-card .val {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-main);
}

/* --- TABLE --- */
.table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto; /* Required for mobile horizontal scroll */
    -webkit-overflow-scrolling: touch;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 700px; /* Ensures table doesn't squish too much on mobile */
}

th {
    text-align: left;
    padding: 16px 24px;
    background: #F1F5F9;
    color: var(--text-muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

td {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 0.938rem;
    white-space: nowrap; /* Prevents text wrapping in table cells */
}

tr:last-child td { border-bottom: none; }

tr:hover td { background: var(--primary-light); }

/* --- STATUS BADGES --- */
.status {
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.delivered { background: #DCFCE7; color: var(--success); }
.pending { background: #FEF3C7; color: var(--warning); }
.cancelled { background: #FEE2E2; color: var(--danger); }

/* --- BUTTONS --- */
.btn {
    padding: 8px 14px;
    font-size: 0.75rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 6px;
    transition: all 0.2s ease;
    background: var(--surface);
    color: var(--text-main);
    display: inline-block;
}

.btn-view:hover {
    background: var(--bg-main);
    border-color: var(--text-muted);
}

.btn-done:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}

/* --- RESPONSIVE ADJUSTMENTS --- */
@media (max-width: 1024px) {
    body { padding: 30px; }
    .kpi-grid { gap: 16px; }
    .kpi-card { padding: 20px; }
    .kpi-card .val { font-size: 1.75rem; }
}

@media (max-width: 768px) {
    body { padding: 20px; }
    .header { margin-bottom: 30px; }
    .kpi-grid { 
        grid-template-columns: 1fr; /* Stack KPIs on mobile */
        gap: 12px;
        margin-bottom: 30px;
    }
    .kpi-card { padding: 18px; }
    .kpi-card .val { font-size: 1.5rem; }
}

@media (max-width: 480px) {
    h1 { font-size: 1.1rem; }
    .btn {
        padding: 6px 10px;
        font-size: 0.7rem;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>ORDER_INTELLIGENCE</h1>
</div>

<div class="kpi-grid">
    <div class="kpi-card">
        <div class="label">Fulfillment Queue</div>
        <div class="val" id="totalOrders">0</div>
    </div>

    <div class="kpi-card" style="border-top: 4px solid var(--success);">
        <div class="label">Completed</div>
        <div class="val" id="delivered" style="color: var(--success);">0</div>
    </div>

    <div class="kpi-card" style="border-top: 4px solid var(--warning);">
        <div class="label">Processing</div>
        <div class="val" id="pending" style="color: var(--warning);">0</div>
    </div>
</div>

<div class="table-container">
<table id="ordersTable">
    <thead>
        <tr>
            <th>Order Ref</th>
            <th>Product</th>
            <th>Qty</th>
            <th>Total Val</th>
            <th>Status</th>
            <th>Execution</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>

<script>
/* ---------------- STATE (UNCHANGED) ---------------- */
const State = {
    orders:[]
};

/* ---------------- SAFE CSV LOADER ---------------- */
async function loadCSV(){
    try{
        const res = await fetch(`/static/data/orders.csv`);
        if(!res.ok){
            State.orders = [];
            render();
            return;
        }
        const text = await res.text();
        State.orders = parseCSV(text);
        render();
    }catch(e){
        State.orders = [];
        render();
    }
}

/* ---------------- SAFE PARSER ---------------- */
function parseCSV(text){
    const rows = text.trim().split("\n");
    if(rows.length < 2) return [];
    const headers = rows[0].split(",").map(h=>h.trim());
    return rows.slice(1)
        .filter(r => r.trim() !== "")
        .map(r=>{
            const values = r.split(",");
            let obj = {};
            headers.forEach((h,i)=>{
                obj[h] = (values[i] || "").trim();
            });
            return obj;
        });
}

/* ---------------- RENDER (LOGIC SAME) ---------------- */
function render(){
    const tbody = document.querySelector("#ordersTable tbody");
    tbody.innerHTML = "";

    let delivered = 0;
    let pending = 0;

    (State.orders || []).forEach(o=>{
        const status = (o.status || "pending").toLowerCase();
        if(status === "delivered") delivered++;
        if(status === "pending") pending++;

        tbody.innerHTML += `
        <tr>
            <td style="color:var(--primary); font-weight:700">#${o.order_id}</td>
            <td style="font-weight:500">${o.product}</td>
            <td>${Number(o.quantity || 0)}</td>
            <td>$${Number(o.total || 0).toLocaleString()}</td>
            <td>
                <span class="status ${status}">
                    ${status}
                </span>
            </td>
            <td>
                <button class="btn btn-view" onclick="viewOrder(${o.order_id})">Inspect</button>
                <button class="btn btn-done" onclick="markDelivered(this)">Deploy</button>
            </td>
        </tr>`;
    });

    document.getElementById("totalOrders").innerText = State.orders.length;
    document.getElementById("delivered").innerText = delivered;
    document.getElementById("pending").innerText = pending;
}

/* ---------------- ACTIONS (UNCHANGED) ---------------- */
function viewOrder(id){
    alert("Accessing Data for Order #" + id);
}

function markDelivered(btn){
    btn.innerText = "Completed";
    btn.style.opacity = "0.4";
    btn.style.background = "transparent";
    btn.disabled = true;
}

/* INIT */
loadCSV();
</script>

</body>
</html>
