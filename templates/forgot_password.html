<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>DMA | Recover Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;800&family=Syncopate:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --accent-purple: #BB86FC;
            --bg-pure: #ffffff;
            --text-main: #000000;
            --border-heavy: 4px solid #000000;
            --shadow-brutal: 10px 10px 0px #000000;
            --error-bg: #ff3333;
            --success-bg: #00FF88;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow: hidden; /* Prevent body scroll */
            display: flex;
            flex-direction: column;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px) 0 0 / 40px 40px;
        }

        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(187, 134, 252, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
            transform: translate(-50%, -50%);
        }

        .page-wrapper {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr; 
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .brand-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
            background: #000;
            color: #fff;
            border-right: 8px solid var(--accent-purple);
        }

        .brand-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2rem, 5vw, 5rem);
            line-height: 0.9;
            letter-spacing: -3px;
        }

        .brand-title span.purple { color: var(--accent-purple); }

        .auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            background: #fff;
            padding: 2.5rem 2rem 1.5rem;
            width: 100%;
            max-width: 440px; 
            border: var(--border-heavy);
            box-shadow: var(--shadow-brutal);
            position: relative;
        }

        .container-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 25px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 6px;
        }

        .dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; }
        .dot.purple { background: var(--accent-purple); }

        h2 { 
            font-size: 1.8rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: -2px; 
            margin-bottom: 0.2rem;
        }

        p.subtitle {
            font-family: 'Fira Code', monospace;
            font-size: 0.6rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            color: #666;
        }

        .status-message {
            display: none;
            color: #000;
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem;
            padding: 8px;
            border: 2px solid #000;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }
        .status-message.error { background: var(--error-bg); }
        .status-message.success { background: var(--success-bg); }

        .input-group { margin-bottom: 1rem; } 
        
        label { 
            font-family: 'Fira Code', monospace;
            font-size: 0.6rem; 
            margin-bottom: 2px; 
            display: block;
            font-weight: 700;
        }

        input { 
            width: 100%; 
            padding: 10px; 
            background: #fff; 
            border: 3px solid #000; 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px; 
            outline: none; 
        }

        input:focus { box-shadow: 4px 4px 0px var(--accent-purple); }

        .btn-main { 
            width: 100%; 
            padding: 14px; 
            background: #000; 
            color: #fff; 
            border: none; 
            font-family: 'Syncopate', sans-serif; 
            font-size: 0.7rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.5rem;
        }

        .btn-main:hover:not(:disabled) { background: var(--accent-purple); color: #000; }
        .btn-main:disabled { opacity: 0.5; }

        .links { margin-top: 1rem; text-align: center; }
        .links a { font-size: 0.55rem; color: #000; text-transform: uppercase; font-weight: 800; text-decoration: none; border-bottom: 2px solid var(--accent-purple);}

        #terminal-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.6rem;
            color: var(--accent-purple);
        }

        /* --- MOBILE OPTIMIZATION: NO SCROLL --- */
        @media (max-width: 1024px) {
            .page-wrapper { 
                display: flex;
                flex-direction: column;
                height: 100vh;
            } 
            .brand-panel { 
                padding: 1rem; 
                flex: 0 0 15%; 
                border-right: none; 
                border-bottom: 4px solid var(--accent-purple); 
                justify-content: center;
                text-align: center;
            }
            .brand-title { font-size: 1.1rem; letter-spacing: -1px; }
            .brand-title br { display: none; }
            .brand-title span::before { content: " "; }

            .auth-panel { flex: 1; padding: 1rem; align-items: center; }

            .auth-container { 
                transform: scale(0.9);
                transform-origin: center;
                max-width: 360px;
                padding: 2.2rem 1.5rem 1.2rem;
            }
            
            h2 { font-size: 1.5rem; }
            #terminal-info, .bg-glow { display: none; }
        }

        @media (max-height: 600px) {
            .auth-container { transform: scale(0.8); }
            .brand-panel { flex: 0 0 12%; }
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow" id="glow"></div>

    <div class="page-wrapper">
        <div class="brand-panel">
            <h1 class="brand-title">RECOVER<br><span class="purple">FORGOT</span><br>PASSWORD</h1>
            <div id="terminal-info">> STATUS: ENCRYPTED_LINK<br>> BENGALURU_ZONE</div>
        </div>

        <div class="auth-panel">
            <div class="auth-container">
                <div class="container-header">
                    <div class="dot"></div>
                    <div class="dot purple"></div>
                    <div class="dot"></div>
                </div>
                <h2>RECOVER_</h2>
                <p class="subtitle">TRANSMIT RESET LINK TO TERMINAL</p>

                <div id="statusBox" class="status-message">
                    > <span id="statusContent">NULL</span>
                </div>

                <form id="recoverForm">
                    <div class="input-group">
                        <label>REGISTERED EMAIL</label>
                        <input type="email" id="resetEmail" placeholder="USER@GMAIL.COM" required>
                    </div>
                    
                    <button type="button" class="btn-main" id="resetBtn">
                        SEND_LINK <span>&rarr;</span>
                    </button>
                </form>

                <div class="links">
                    <a href="{{ url_for('login_page') }}">Return to System Login</a>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    const glow = document.getElementById('glow');
    if (window.innerWidth > 768) {
        document.addEventListener('mousemove', (e) => {
            requestAnimationFrame(() => {
                glow.style.left = e.clientX + 'px';
                glow.style.top = e.clientY + 'px';
            });
        });
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCC3IkeAr0q4D1MU7_K7MODofejVTSfOyc",
        authDomain: "digital-dashboard-1be1a.firebaseapp.com",
        projectId: "digital-dashboard-1be1a",
        storageBucket: "digital-dashboard-1be1a.firebasestorage.app",
        messagingSenderId: "516289925711",
        appId: "1:516289925711:web:7eca40582781877b77d03a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const statusBox = document.getElementById('statusBox');
    const statusContent = document.getElementById('statusContent');
    const resetBtn = document.getElementById('resetBtn');

    resetBtn.onclick = () => {
        const email = document.getElementById("resetEmail").value.trim();
        statusBox.style.display = "none";

        if (!email) {
            statusBox.className = "status-message error";
            statusContent.innerText = "FAIL: EMAIL_REQUIRED";
            statusBox.style.display = "block";
            return;
        }

        sendPasswordResetEmail(auth, email)
            .then(() => {
                statusBox.className = "status-message success";
                statusContent.innerText = "SUCCESS: LINK_TRANSMITTED";
                statusBox.style.display = "block";
                resetBtn.disabled = true;
            })
            .catch(err => {
                statusBox.className = "status-message error";
                statusContent.innerText = "ERROR: " + err.code.replace('auth/', '').toUpperCase();
                statusBox.style.display = "block";
            });
    };
</script>
</body>
</html>
