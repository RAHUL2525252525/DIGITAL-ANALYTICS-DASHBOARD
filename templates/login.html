<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=no">
    <title>DMA | Digital Marketing Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;800&family=Syncopate:wght@700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent-purple: #BB86FC;
            --bg-pure: #ffffff;
            --text-main: #000000;
            --border-heavy: 4px solid #000000;
            --shadow-brutal: 10px 10px 0px #000000;
            --error-bg: #ff3333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }

        body {
            background-color: var(--bg-pure);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.03) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.01));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px) 0 0 / 40px 40px;
        }

        .bg-glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(187, 134, 252, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(60px);
            transform: translate(-50%, -50%);
        }

        .page-wrapper {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        .brand-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
            background: #000;
            color: #fff;
            border-right: 8px solid var(--accent-purple);
        }

        .brand-title {
            font-family: 'Syncopate', sans-serif;
            font-size: clamp(2.5rem, 5vw, 5rem);
            line-height: 0.9;
            letter-spacing: -3px;
        }

        .brand-title span.purple { color: var(--accent-purple); }

        .auth-panel {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-container {
            background: #fff;
            padding: 3rem 2rem 2rem 2rem;
            width: 100%;
            max-width: 440px;
            border: var(--border-heavy);
            box-shadow: var(--shadow-brutal);
            position: relative;
        }

        .container-header {
            position: absolute;
            top: 0; left: 0; width: 100%;
            height: 30px;
            background: #000;
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 6px;
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; }
        .dot.purple { background: var(--accent-purple); }

        h2 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            letter-spacing: -3px; 
            margin-bottom: 1rem;
        }

        .error-message {
            display: none;
            background: var(--error-bg);
            padding: 8px;
            border: 3px solid #000;
            margin-bottom: 1rem;
            font-size: 0.65rem;
        }

        .input-group { margin-bottom: 0.8rem; }
        
        label { 
            font-family: 'Fira Code', monospace;
            font-size: 0.65rem; 
            margin-bottom: 4px; 
            display: block;
            font-weight: 700;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            border: 3px solid #000; 
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px; 
            outline: none; 
        }

        input:focus { 
            box-shadow: 4px 4px 0px var(--accent-purple);
        }

        .password-wrapper { position: relative; display: flex; align-items: center; }
        .eye-toggle { position: absolute; right: 15px; background: none; border: none; z-index: 10; cursor: pointer; }

        .btn-main { 
            width: 100%; 
            padding: 16px; 
            background: #000; 
            color: #fff; 
            border: none; 
            font-family: 'Syncopate', sans-serif; 
            font-size: 0.75rem; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .btn-main:hover { background: var(--accent-purple); color: #000; }

        .google-btn { 
            width: 100%; 
            padding: 12px; 
            background: #fff; 
            border: 3px solid #000; 
            font-weight: 800; 
            font-size: 0.6rem; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px; 
            margin-top: 0.6rem;
        }

        .links {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
        }

        .links a { 
            color: #000; 
            font-size: 0.55rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            text-decoration: none;
            border-bottom: 2px solid var(--accent-purple);
        }

        #terminal-info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.6rem;
            color: var(--accent-purple);
        }

        /* --- MOBILE OPTIMIZATION: FULL VIEW WITHOUT SCROLLING --- */
        @media (max-width: 1024px) { 
            .page-wrapper { 
                display: flex;
                flex-direction: column;
                height: 100vh; /* Lock height */
                overflow: hidden; /* Prevent body scroll */
            } 
            .brand-panel { 
                padding: 1rem;
                flex: 0 0 20%; /* Take only 20% height */
                border-right: none;
                border-bottom: 4px solid var(--accent-purple);
                text-align: center;
                justify-content: center;
            } 
            .brand-title { font-size: 1.2rem; letter-spacing: -1px; }
            .brand-title br { display: none; } /* Flatten title to save vertical space */
            .brand-title span::before { content: " "; }

            .auth-panel { 
                flex: 1; /* Take remaining space */
                padding: 0.5rem;
                align-items: center;
            }

            .auth-container { 
                transform: scale(0.85); /* "Zoom out" effect */
                transform-origin: center;
                margin: 0;
                padding: 2.5rem 1.5rem 1.5rem 1.5rem;
                max-width: 360px;
                box-shadow: 6px 6px 0px #000;
            }

            h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
            #terminal-info { display: none; } /* Hide to save space */
            .bg-glow { display: none; }
        }

        /* Extreme small screen height fix */
        @media (max-height: 600px) and (max-width: 480px) {
            .auth-container { transform: scale(0.75); }
            .brand-panel { display: none; } /* Hide brand if screen is too short */
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow" id="glow"></div>

    <div class="page-wrapper">
        <div class="brand-panel">
            <h1 class="brand-title">DIGITAL<br><span class="purple">MARKETING</span><br>DASHBOARD</h1>
            <div id="terminal-info">> SYSTEM READY<br>> BENGALURU_ZONE</div>
        </div>

        <div class="auth-panel">
            <div class="auth-container">
                <div class="container-header">
                    <div class="dot"></div>
                    <div class="dot purple"></div>
                    <div class="dot"></div>
                </div>
                <h2>LOGIN_</h2>

                <div id="authError" class="error-message">
                    > AUTH_FAILURE: <span id="errorDetails">INVALID_NODE</span>
                </div>

                <form id="loginForm">
                    <div class="input-group">
                        <label>EMAIL</label>
                        <input type="email" id="email" placeholder="USER@GMAIL.COM" required>
                    </div>
                    <div class="input-group">
                        <label>PASSWORD</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="••••••••" required>
                            <button type="button" class="eye-toggle" id="togglePassword">
                                <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="button" class="btn-main" id="loginBtn">
                        LOGIN <span>&rarr;</span>
                    </button>
                    <button type="button" class="google-btn" id="googleBtn">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="G" width="14">
                        LOGIN WITH GOOGLE
                    </button>
                </form>

                <div class="links">
                    <a href="{{ url_for('register_page') }}">Register</a>
                    <a href="{{ url_for('forgot_page') }}">Forgot Password</a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Logic preserved exactly as requested
        const glow = document.getElementById('glow');
        if (window.innerWidth > 768) {
            document.addEventListener('mousemove', (e) => {
                requestAnimationFrame(() => {
                    glow.style.left = e.clientX + 'px';
                    glow.style.top = e.clientY + 'px';
                });
            });
        }

        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            if (type === 'text') {
                eyeIcon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
            } else {
                eyeIcon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>`;
            }
        });

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCC3IkeAr0q4D1MU7_K7MODofejVTSfOyc",
            authDomain: "digital-dashboard-1be1a.firebaseapp.com",
            projectId: "digital-dashboard-1be1a",
            storageBucket: "digital-dashboard-1be1a.firebasestorage.app",
            messagingSenderId: "516289925711",
            appId: "1:516289925711:web:7eca40582781877b77d03a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        const errorBox = document.getElementById('authError');
        const errorDetails = document.getElementById('errorDetails');

        const showError = (msg) => {
            errorBox.style.display = 'block';
            errorDetails.innerText = msg.toUpperCase();
        };

        document.getElementById("loginBtn").addEventListener("click", async () => {
            errorBox.style.display = 'none';
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            
            if(!email || !password) {
                showError("REQUIRED_FIELDS_EMPTY");
                return;
            }

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const idToken = await userCredential.user.getIdToken();
                const response = await fetch('/login-handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, idToken, name: userCredential.user.displayName })
                });
                const result = await response.json();
                if (result.status === 'success') window.location.href = result.redirect;
                else showError(result.message || "ACCESS_DENIED");
            } catch (err) { 
                showError(err.code.replace('auth/', '')); 
            }
        });

        document.getElementById("googleBtn").addEventListener("click", async () => {
            errorBox.style.display = 'none';
            try {
                const result = await signInWithPopup(auth, googleProvider);
                const idToken = await result.user.getIdToken();
                const response = await fetch('/login-handler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: result.user.email, idToken, name: result.user.displayName })
                });
                const data = await response.json();
                if (data.status === 'success') window.location.href = data.redirect;
            } catch (err) { 
                showError("SYNC_FAILED"); 
            }
        });
    </script>
</body>
</html>
