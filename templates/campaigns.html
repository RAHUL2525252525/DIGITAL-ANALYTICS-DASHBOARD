<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether | Campaigns Intelligence Pro</title>

<!-- Modern Sans-Serif Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4F46E5; /* Indigo */
    --primary-light: #EEF2FF;
    --success: #10B981;
    --danger: #EF4444;
    --bg-main: #F8FAFC;
    --surface: #FFFFFF;
    --text-main: #1E293B;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --radius: 16px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    padding: 40px;
    line-height: 1.5;
    min-height: 100vh;
}

/* --- HEADER SECTION --- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
    flex-wrap: wrap; /* Allows wrap on small screens */
    gap: 20px;
}

.brand-section h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.brand-section h1::before {
    content: '';
    width: 8px;
    height: 24px;
    background: var(--primary);
    border-radius: 4px;
}

/* --- BUTTON STYLING --- */
.btn {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 10px 20px;
    color: var(--text-main);
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 600;
    border-radius: 10px;
    box-shadow: var(--shadow);
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn:hover {
    background: var(--bg-main);
    border-color: var(--text-muted);
    transform: translateY(-1px);
}

/* --- KPI GRID --- */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-bottom: 40px;
}

.card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: transform 0.2s ease;
}

.card:hover {
    transform: translateY(-4px);
}

.card h4 {
    color: var(--text-muted);
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
}

.card .val {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-main);
    word-break: break-word; /* Prevents overflow on mobile */
}

/* --- TABLE SECTION --- */
.table-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow-x: auto; /* Required for horizontal scroll on mobile */
    -webkit-overflow-scrolling: touch;
}

table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px; /* Ensures table columns don't squash on mobile */
}

th {
    text-align: left;
    padding: 16px 24px;
    background: #F1F5F9;
    color: var(--text-muted);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
}

td {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    font-size: 0.938rem;
    color: var(--text-main);
}

tr:last-child td { border-bottom: none; }

tr:hover td {
    background: var(--primary-light);
}

.campaign-name-cell {
    font-weight: 600;
    color: var(--primary);
}

.positive { color: var(--success); font-weight: 700; }
.negative { color: var(--danger); font-weight: 700; }

/* --- RESPONSIVE BREAKPOINTS --- */

/* Tablet & Laptop Medium */
@media (max-width: 1024px) {
    .kpi-grid { gap: 16px; }
    .card { padding: 20px; }
    .card .val { font-size: 1.75rem; }
}

/* Mobile Layout */
@media (max-width: 768px) {
    body { padding: 20px; }
    
    .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
    }
    
    .btn {
        width: 100%; /* Make export button full width on mobile */
        justify-content: center;
    }

    .kpi-grid { 
        grid-template-columns: 1fr; /* Stack cards vertically */
        gap: 12px;
    }
    
    .card .val { font-size: 1.5rem; }
    
    .brand-section h1 { font-size: 1.15rem; }
}
</style>
</head>

<body>

<div class="header">
    <div class="brand-section">
        <h1>CAMPAIGNS_ANALYTICS</h1>
    </div>
    <button class="btn" onclick="exportCSV()">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        Export CSV
    </button>
</div>

<div class="kpi-grid">
    <div class="card">
        <h4>Active Campaigns</h4>
        <div class="val" id="totalCampaigns">0</div>
    </div>

    <div class="card">
        <h4>Total Spend</h4>
        <div class="val" id="totalSpend">$0</div>
    </div>

    <div class="card">
        <h4>Average Efficiency</h4>
        <div class="val" id="avgROI" style="color: var(--primary);">0%</div>
    </div>
</div>

<div class="table-container">
<table id="campaignTable">
    <thead>
        <tr>
            <th>Campaign Name</th>
            <th>Spend Allocation</th>
            <th>Interactions</th>
            <th>Conversions</th>
            <th>ROI Efficiency</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
</div>

<script>
/* ---------------- STATE & LOGIC (Fully Preserved) ---------------- */
const State = {
    data: { campaigns: [], products: [], traffic: [], conversions: [] }
};

async function loadCSV(){
    const files = ["campaigns", "products", "traffic", "conversions"];
    for(let f of files){
        try {
            const res = await fetch(`/static/data/${f}.csv`);
            if(!res.ok) continue;
            const text = await res.text();
            State.data[f] = parseCSV(text);
        } catch(e) { console.error("ERR_LOAD:", f); }
    }
    render();
}

function parseCSV(text){
    const rows = text.trim().split("\n");
    if(rows.length < 2) return [];
    const headers = rows[0].split(",").map(h => h.trim());
    return rows.slice(1).map(r => {
        const values = r.split(",");
        let obj = {};
        headers.forEach((h, i) => { obj[h.trim()] = (values[i] ?? "").trim(); });
        return obj;
    }).filter(r => Object.keys(r).length > 0);
}

function render(){
    const { campaigns, products, traffic, conversions } = State.data;
    let totalSpend = 0, totalROI = 0;
    const tbody = document.querySelector("#campaignTable tbody");
    tbody.innerHTML = "";

    campaigns.forEach(c => {
        const spend = Number(c.spend || 0);
        const revenue = products.filter(p => p.campaign_name === c.campaign_name)
                                .reduce((s, p) => s + (Number(p.price||0) * Number(p.sales||0)), 0);
        const roi = spend ? ((revenue-spend)/spend)*100 : 0;
        totalSpend += spend;
        totalROI += roi;

        const clicks = traffic.filter(t => t.campaign_name === c.campaign_name)
                              .reduce((s, t) => s + (Number(t.clicks)||0), 0);
        const conv = conversions.filter(x => x.campaign_name === c.campaign_name)
                                .reduce((s, x) => s + (Number(x.conversions)||0), 0);

        tbody.innerHTML += `
        <tr>
            <td class="campaign-name-cell">${c.campaign_name}</td>
            <td>$${spend.toLocaleString()}</td>
            <td>${clicks.toLocaleString()}</td>
            <td>${conv.toLocaleString()}</td>
            <td class="${roi >= 0 ? 'positive' : 'negative'}">
                ${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%
            </td>
        </tr>`;
    });

    document.getElementById("totalCampaigns").innerText = campaigns.length;
    document.getElementById("totalSpend").innerText = "$" + totalSpend.toLocaleString();
    document.getElementById("avgROI").innerText = (campaigns.length ? (totalROI / campaigns.length).toFixed(1) : 0) + "%";
}

function exportCSV(){
    let csv = [];
    const rows = document.querySelectorAll("#campaignTable tr");
    rows.forEach(r => {
        let cols = r.querySelectorAll("td, th"), row = [];
        cols.forEach(c => row.push(c.innerText));
        csv.push(row.join(","));
    });
    const blob = new Blob([csv.join("\n")], { type: "text/csv" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "AETHER_CAMPAIGN_DATA.csv";
    a.click();
}

loadCSV();
</script>

</body>
</html>
