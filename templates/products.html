<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aether | Product Intelligence</title>

<!-- Modern Sans-Serif Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4F46E5; /* Indigo */
    --primary-light: #EEF2FF;
    --success: #10B981;
    --danger: #EF4444;
    --bg-main: #F8FAFC;
    --surface: #FFFFFF;
    --text-main: #1E293B;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --radius: 16px;
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 40px; /* Standard laptop padding */
    line-height: 1.5;
}

/* --- HEADER --- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 40px;
}

h1 {
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
}

h1::before {
    content: '';
    width: 8px;
    height: 24px;
    background: var(--primary);
    border-radius: 4px;
}

/* --- GRID --- */
.grid {
    display: grid;
    /* auto-fit handles laptop 3-col and automatic flow perfectly */
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
}

/* --- CARD --- */
.card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
}

.card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

.card h3 {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    padding-right: 60px; /* Space for the badge */
}

.price {
    font-size: 1.875rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.5px;
}

.meta {
    font-size: 0.875rem;
    color: var(--text-muted);
    margin-top: 8px;
}

.revenue {
    margin-top: 15px;
    font-size: 0.875rem;
    color: var(--primary);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.revenue::before {
    content: '→';
    font-weight: 400;
}

/* --- BADGE --- */
.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    display: inline-block;
    padding: 4px 10px;
    font-size: 0.65rem;
    font-weight: 700;
    border-radius: 6px;
    background: #FEF2F2;
    color: var(--danger);
    border: 1px solid rgba(239, 68, 68, 0.1);
}

/* KPI Variant */
.kpi-row .card {
    border-top: 4px solid var(--primary);
}

.kpi-row .card:nth-child(1) { border-top-color: var(--border); }
.kpi-row .card:nth-child(3) { border-top-color: var(--success); }

/* --- RESPONSIVE FIXES --- */
@media (max-width: 768px) {
    body { padding: 20px; } /* Less padding on small screens */
    .grid { 
        grid-template-columns: 1fr; /* Force 1 column on mobile */
        gap: 16px;
    }
    .header { margin-bottom: 25px; }
    .price { font-size: 1.5rem; } /* Scale down price text for mobile */
    .kpi-row { margin-bottom: 20px !important; }
}
</style>
</head>

<body>

<div class="header">
    <h1>PRODUCT_INTELLIGENCE</h1>
</div>

<div class="grid kpi-row" style="margin-bottom:40px;">
    <div class="card">
        <h3>Catalog Depth</h3>
        <div class="price" id="totalProducts">0</div>
    </div>

    <div class="card">
        <h3>Gross Revenue</h3>
        <div class="price" id="totalRevenue" style="color: var(--primary);">$0</div>
    </div>

    <div class="card">
        <h3>Lead Performer</h3>
        <div class="price" id="topProduct" style="font-size: 1.125rem; text-transform: uppercase;">-</div>
    </div>
</div>

<div class="grid" id="productGrid"></div>

<script>
// --- STATE & LOGIC PRESERVED ---
const State = {
    products:[]
};

async function loadCSV(){
    try{
        const res = await fetch(`/static/data/products.csv`);
        if(!res.ok){
            State.products = [];
            render();
            return;
        }
        const text = await res.text();
        State.products = parseCSV(text);
        render();
    }catch(e){
        State.products = [];
        render();
    }
}

function parseCSV(text){
    const rows = text.trim().split("\n");
    if(rows.length < 2) return [];
    const headers = rows[0].split(",").map(h=>h.trim());
    return rows.slice(1)
        .filter(r => r.trim() !== "")
        .map(r=>{
            const values = r.split(",");
            let obj = {};
            headers.forEach((h,i)=>{
                obj[h] = (values[i] || "").trim();
            });
            return obj;
        });
}

function render(){
    const grid = document.getElementById("productGrid");
    grid.innerHTML = "";

    let totalRevenue = 0;
    let top = {name:"", value:0};

    (State.products || []).forEach(p=>{
        const price = Number(p.price || 0);
        const sales = Number(p.sales || 0);
        const revenue = price * sales;
        totalRevenue += revenue;

        if(revenue > top.value){
            top = {name: p.product_name, value: revenue};
        }

        grid.innerHTML += `
        <div class="card">
            <h3>${p.product_name || "Unknown Product"}</h3>
            <div class="price">$${price.toLocaleString()}</div>
            <div class="meta">Velocity: ${sales.toLocaleString()} units</div>
            <div class="revenue">
                Contrib: $${revenue.toLocaleString()}
            </div>
            ${sales < 10 ? `<div class="badge">LOW STOCK</div>` : ``}
        </div>`;
    });

    document.getElementById("totalProducts").innerText = (State.products || []).length;
    document.getElementById("totalRevenue").innerText = "$" + totalRevenue.toLocaleString();
    document.getElementById("topProduct").innerText = top.name || "-";
}

loadCSV();
</script>

</body>
</html>
